<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no">
    <title>跳拉趣味单</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/subpage.css">
</head>
<body>
    <!-- 背景 -->
    <div class="background">
        <div class="background-image"></div>
    </div>

    <!-- 主要内容区域 -->
    <div class="main-wrapper">
        <!-- 固定白色Header -->
        <div class="subpage-header">
            <div class="subpage-header-container">
                <!-- 返回首页按钮 -->
            <div class="back-home-wrapper">
                <div class="back-home" onclick="window.location.href='../../index.html'" title="返回首页">
                    <span>返回首页</span>
                </div>
            </div>
            </div>
        </div>
        

        <!-- 页面内容 -->
        <div class="page-content subpage-content">
            <!-- 页面标题 -->
            <div class="subpage-title-section">
                <h1>跳拉趣味单</h1>
            </div>

            <!-- 标签页和内容区域 -->
            <div class="tab-section">
                <div class="tab-header">
                    <div class="tab-item active">🔴趣味单</div>
                </div>
                <div class="tab-content active">
                    <div class="content-image">
                        <img src="../../images/menu/趣味单.png" alt="趣味单" onerror="this.classList.add('image-placeholder'); this.style.display='none';">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 图片加载失败时显示占位符
        document.addEventListener('DOMContentLoaded', function() {
            // 处理所有图片
            const images = document.querySelectorAll('img');
            images.forEach(function(img) {
                // 检查图片src是否存在
                if (!img.src || img.src === window.location.href) {
                    img.classList.add('image-placeholder');
                    return;
                }

                img.addEventListener('error', function() {
                    // 图片加载失败，添加占位符类
                    this.classList.add('image-placeholder');
                    this.style.display = 'none';
                });
                
                img.addEventListener('load', function() {
                    // 图片加载成功，移除占位符类
                    this.classList.remove('image-placeholder');
                    this.style.display = '';
                });
            });
        });
    </script>
</body>
</html>
